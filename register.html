<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkVault — Register</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="car car-1">🚗</div>
  <div class="car car-2">🚙</div>

  <div class="page-wrapper" style="align-items:flex-start; padding: 40px 24px;">
    <div class="glass-card" style="max-width:520px; margin:auto;">

      <div class="brand">
        <div class="brand-icon">
          <span style="font-size:1.4rem;">🅿️</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">ParkVault</span>
          <span class="brand-sub">Smart Parking System</span>
        </div>
      </div>

      <h1 class="card-title">Create Account</h1>
      <p class="card-subtitle">Join ParkVault and start parking smarter today</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div style="background:rgba(255,107,107,0.12); border:1px solid rgba(255,107,107,0.3); color:#ff6b6b; padding:10px 14px; border-radius:12px; font-size:0.82rem; margin-bottom:12px;">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form class="login-form" action="/register" method="POST" style="gap:16px;">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="input-group">
            <label for="fname">First Name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" id="fname" name="fname" placeholder="Arjun"/>
            </div>
          </div>
          <div class="input-group">
            <label for="lname">Last Name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" id="lname" name="lname" placeholder="Sharma"/>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="arjun@example.com"/>
          </div>
        </div>

        <div class="input-group">
          <label for="phone">Phone Number</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.63a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
            </span>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210"/>
          </div>
        </div>

        <div class="input-group">
          <label for="vehicle">Vehicle Number</label>
          <div class="input-wrap">
            <span class="input-icon">🚗</span>
            <input type="text" id="vehicle" name="vehicle" placeholder="RJ14 AB 1234" style="padding-left:44px;"/>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="input-group">
            <label for="pass">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input type="password" id="pass" name="pass" placeholder="••••••••"/>
            </div>
          </div>
          <div class="input-group">
            <label for="cpass">Confirm Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input type="password" id="cpass" name="cpass" placeholder="••••••••"/>
            </div>
          </div>
        </div>

        <!-- T&C -->
        <label class="remember" style="align-items:flex-start; gap:10px;">
          <input type="checkbox" id="terms" name="terms"/>
          <span class="checkmark" style="margin-top:2px;"></span>
          <span style="font-size:0.82rem; color:var(--text-muted);">I agree to the <a href="#" style="color:var(--accent); text-decoration:none;">Terms of Service</a> and <a href="#" style="color:var(--accent); text-decoration:none;">Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn-login" style="margin-top:4px;">
          <span>Create Account</span>
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>

      <p class="signup-text" style="margin-top:20px;">
        Already have an account? <a href="/">Sign In</a>
      </p>

    </div>
  </div>

</body>
</html>
