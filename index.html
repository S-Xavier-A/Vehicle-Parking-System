<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkVault — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="car car-1">🚗</div>
  <div class="car car-2">🚙</div>

  <div class="page-wrapper">
    <div class="glass-card">

      <div class="brand">
        <div class="brand-icon">
          <span style="font-size:1.4rem;">🅿️</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">ParkVault</span>
          <span class="brand-sub">Smart Parking System</span>
        </div>
      </div>

      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Sign in to manage your parking reservations</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div style="background:rgba(255,107,107,0.12); border:1px solid rgba(255,107,107,0.3); color:#ff6b6b; padding:10px 14px; border-radius:12px; font-size:0.82rem; margin-bottom:12px;">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form class="login-form" action="/login" method="POST">

        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="email" name="email" placeholder="arjun@example.com"/>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••"/>
          </div>
        </div>

        <div class="remember-row">
          <label class="remember">
            <input type="checkbox" id="remember"/>
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">
          <span>Sign In</span>
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>

      <p class="signup-text" style="margin-top:20px;">
        Don't have an account? <a href="/register">Create one</a>
      </p>

    </div>
  </div>

</body>
</html>
